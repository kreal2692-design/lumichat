<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Test - LumiChat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #0b0f17;
      color: #e8f0f8;
    }
    .test-section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,229,255,0.25);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }
    button {
      background: #4285F4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover { opacity: 0.9; }
    .success { color: #2ecc71; }
    .error { color: #ff7675; }
    .info { color: #00e5ff; }
    pre {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>🔍 LumiChat Auth Test</h1>
  
  <div class="test-section">
    <h2>1. Supabase Bağlantı Testi</h2>
    <button onclick="testConnection()">Bağlantıyı Test Et</button>
    <div id="connectionResult"></div>
  </div>

  <div class="test-section">
    <h2>2. Google OAuth Testi</h2>
    <button onclick="testGoogleOAuth()">Google OAuth Test</button>
    <div id="oauthResult"></div>
  </div>

  <div class="test-section">
    <h2>3. Mevcut Oturum</h2>
    <button onclick="checkSession()">Oturumu Kontrol Et</button>
    <button onclick="clearSession()">Oturumu Temizle</button>
    <div id="sessionResult"></div>
  </div>

  <div class="test-section">
    <h2>4. Console Logları</h2>
    <div id="consoleLog" style="max-height: 300px; overflow-y: auto;"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://aaszyppzidhazpbmcipv.supabase.co";
    const SUPABASE_KEY = "sb_publishable_UShAjuEa8A4dFcQ5zXVCdg_tsUKrAP3";
    
    // Console log yakalama
    const consoleLog = document.getElementById('consoleLog');
    const originalLog = console.log;
    const originalError = console.error;
    
    function addLog(type, ...args) {
      const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
      consoleLog.innerHTML += `<pre class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</pre>`;
      consoleLog.scrollTop = consoleLog.scrollHeight;
    }
    
    console.log = (...args) => { originalLog(...args); addLog('info', ...args); };
    console.error = (...args) => { originalError(...args); addLog('error', ...args); };

    console.log("Test sayfası yüklendi");
    console.log("SUPABASE_URL:", SUPABASE_URL);
    console.log("Location:", window.location.href);
    console.log("Origin:", window.location.origin);

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { 
        storageKey: 'lumi-auth-test',
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: true,
        flowType: 'pkce'
      }
    });

    // Test fonksiyonlarını global yap
    window.testConnection = async function() {
      const result = document.getElementById('connectionResult');
      result.innerHTML = '<p>Test ediliyor...</p>';
      
      try {
        // Basit bir sorgu dene
        const { data, error } = await supabase.from('users').select('count').limit(0);
        
        if (error && error.message.includes('relation "public.users" does not exist')) {
          result.innerHTML = '<p class="error">❌ Veritabanında "users" tablosu yok!</p><p>Supabase Dashboard > SQL Editor\'dan tabloyu oluştur.</p>';
        } else if (error) {
          result.innerHTML = `<p class="error">❌ Hata: ${error.message}</p>`;
        } else {
          result.innerHTML = '<p class="success">✅ Supabase bağlantısı başarılı!</p>';
        }
        
        console.log("Bağlantı testi:", { data, error });
      } catch (err) {
        result.innerHTML = `<p class="error">❌ Bağlantı hatası: ${err.message}</p>`;
        console.error("Bağlantı hatası:", err);
      }
    };

    window.testGoogleOAuth = async function() {
      const result = document.getElementById('oauthResult');
      result.innerHTML = '<p>Google OAuth testi başlatılıyor...</p>';
      
      try {
        const redirectUrl = window.location.origin + '/index.html';
        console.log("OAuth redirect URL:", redirectUrl);
        
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: { 
            redirectTo: redirectUrl,
            skipBrowserRedirect: false,
            queryParams: {
              access_type: 'offline',
              prompt: 'consent',
            }
          }
        });
        
        if (error) {
          result.innerHTML = `<p class="error">❌ OAuth hatası: ${error.message}</p>`;
          console.error("OAuth error:", error);
          
          // Yaygın hatalar için öneriler
          if (error.message.includes('redirect')) {
            result.innerHTML += '<p class="info">💡 Redirect URL hatası: Supabase Dashboard > Authentication > URL Configuration\'da şu URL\'yi ekle:</p>';
            result.innerHTML += `<pre>${redirectUrl}</pre>`;
          } else if (error.message.includes('provider')) {
            result.innerHTML += '<p class="info">💡 Provider hatası: Supabase Dashboard > Authentication > Providers > Google\'ı aktifleştir.</p>';
          }
        } else {
          result.innerHTML = '<p class="success">✅ OAuth başlatıldı! Google\'a yönlendiriliyorsun...</p>';
          console.log("OAuth data:", data);
        }
      } catch (err) {
        result.innerHTML = `<p class="error">❌ Beklenmeyen hata: ${err.message}</p>`;
        console.error("OAuth exception:", err);
      }
    };

    window.checkSession = async function() {
      const result = document.getElementById('sessionResult');
      result.innerHTML = '<p>Oturum kontrol ediliyor...</p>';
      
      try {
        const { data: { session }, error } = await supabase.auth.getSession();
        
        if (error) {
          result.innerHTML = `<p class="error">❌ Hata: ${error.message}</p>`;
        } else if (session) {
          result.innerHTML = '<p class="success">✅ Aktif oturum var!</p>';
          result.innerHTML += `<pre>${JSON.stringify({
            user: session.user.email,
            expires: new Date(session.expires_at * 1000).toLocaleString()
          }, null, 2)}</pre>`;
        } else {
          result.innerHTML = '<p class="info">ℹ️ Aktif oturum yok.</p>';
        }
        
        console.log("Session:", session);
      } catch (err) {
        result.innerHTML = `<p class="error">❌ Hata: ${err.message}</p>`;
        console.error("Session error:", err);
      }
    };

    window.clearSession = async function() {
      const result = document.getElementById('sessionResult');
      result.innerHTML = '<p>Oturum temizleniyor...</p>';
      
      try {
        await supabase.auth.signOut();
        localStorage.clear();
        result.innerHTML = '<p class="success">✅ Oturum temizlendi!</p>';
        console.log("Session cleared");
      } catch (err) {
        result.innerHTML = `<p class="error">❌ Hata: ${err.message}</p>`;
        console.error("Clear error:", err);
      }
    };

    // Auth state change dinle
    supabase.auth.onAuthStateChange((event, session) => {
      console.log("Auth state changed:", event, session?.user?.email || "no user");
    });

    // URL'de hash var mı kontrol et (OAuth redirect sonrası)
    if (window.location.hash) {
      console.log("URL hash detected:", window.location.hash);
      const result = document.getElementById('oauthResult');
      result.innerHTML = '<p class="info">OAuth redirect algılandı! Oturum işleniyor...</p>';
    }
  </script>
</body>
</html>
