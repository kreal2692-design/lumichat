# Bu dosyayı VDS'e kopyala:
# sudo cp nginx-security.conf /etc/nginx/conf.d/security.conf
# sudo nginx -t && sudo systemctl reload nginx

# ── DDoS & Rate Limit ────────────────────────────────────────────────
# Bağlantı sayısı limiti (IP başına max 20 bağlantı)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
limit_conn conn_limit 20;

# İstek hızı limiti (IP başına saniyede max 10 istek)
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
limit_req zone=req_limit burst=20 nodelay;

# ── Güvenlik başlıkları ──────────────────────────────────────────────
add_header X-Content-Type-Options    "nosniff"                    always;
add_header X-Frame-Options           "DENY"                       always;
add_header X-XSS-Protection          "1; mode=block"              always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ── Buffer boyutu limitleri ──────────────────────────────────────────
client_body_buffer_size    10K;
client_header_buffer_size  1k;
client_max_body_size       8m;
large_client_header_buffers 2 1k;

# ── Timeout ayarları ─────────────────────────────────────────────────
client_body_timeout   12;
client_header_timeout 12;
keepalive_timeout     15;
send_timeout          10;

# ── Kötü bot engelleme ───────────────────────────────────────────────
if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|zgrab|python-requests|curl/7)) {
    return 444;
}

# ── Boş User-Agent engelle ───────────────────────────────────────────
if ($http_user_agent = "") {
    return 444;
}
