<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiChat - Canlı Görüntülü Sohbet</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
            authDomain: "lumichat-64dc8.firebaseapp.com",
            projectId: "lumichat-64dc8",
            storageBucket: "lumichat-64dc8.firebasestorage.app",
            messagingSenderId: "255322307057",
            appId: "1:255322307057:web:9f19046678fb1332b8ac50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = async (event) => {
            if (event) event.preventDefault();
            try { await signInWithPopup(auth, provider); } 
            catch (err) { console.error("Giriş hatası:", err); }
        };

        onAuthStateChanged(auth, async (user) => {
            const authScreen = document.getElementById('auth-screen');
            const mainApp = document.getElementById('main-app');
            if (user) {
                authScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                // Girişten sonra otomatik başlat
                if (!window.socketConnected) {
                    window.socketConnected = true;
                    socket.emit('join');
                }
            } else {
                authScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        });
    </script>
    <style>
        body { margin: 0; background: #0b131a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b131a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-box { background: #fff; padding: 40px; border-radius: 15px; text-align: center; width: 350px; color: #333; }
        .google-btn { background: #4285F4; color: white; padding: 15px; border-radius: 8px; width: 100%; border: none; cursor: pointer; font-size: 16px; margin-top: 20px; }
        #main-app { display: none; flex-direction: column; height: 100vh; }
        .video-container { display: flex; flex: 1; padding: 10px; gap: 10px; height: calc(100vh - 100px); }
        .video-box { flex: 1; background: #000; border: 2px solid #00e5ff; border-radius: 12px; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { height: 80px; display: flex; justify-content: center; align-items: center; gap: 15px; background: #0f1c24; }
        .chat-container { width: 300px; background: #142530; display: flex; flex-direction: column; }
        #chatBox { flex: 1; padding: 10px; overflow-y: auto; }
        .input-area { padding: 10px; display: flex; gap: 5px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>LumiChat Üyesi Olun</h2>
            <button class="google-btn" onclick="loginWithGoogle(event)">Google ile Giriş Yap</button>
        </div>
    </div>

    <div id="main-app">
        <div class="video-container">
            <div class="video-box"><video id="localVideo" autoplay muted playsinline></video></div>
            <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
            <div class="chat-container">
                <div id="chatBox"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz...">
                    <button id="sendBtn">Gönder</button>
                </div>
            </div>
        </div>
        <div class="controls">
            <button onclick="toggleTrack('video')">Kamera</button>
            <button onclick="toggleTrack('audio')">Mikrofon</button>
            <button onclick="location.reload()">Sıradaki</button>
        </div>
    </div>

    <script>
        const socket = io('https://lumichat-motor.onrender.com');
        let localStream, peerConnection;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => { 
            localStream = s; document.getElementById('localVideo').srcObject = s; 
        });

        function toggleTrack(type) {
            localStream.getTracks().forEach(t => { if (t.kind === type) t.enabled = !t.enabled; });
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const m = document.getElementById('messageInput').value;
            if (m) { socket.emit('message', m); document.getElementById('chatBox').innerHTML += `<div>Sen: ${m}</div>`; document.getElementById('messageInput').value = ''; }
        }

        // WebRTC işlemleri (eşleşme)
        socket.on('matched', async (d) => {
            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('signal', { candidate: e.candidate }); };
            if (d.isInitiator) { const o = await peerConnection.createOffer(); await peerConnection.setLocalDescription(o); socket.emit('signal', { offer: o }); }
        });

        socket.on('signal', async (d) => {
            if (d.offer) { await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer)); const a = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(a); socket.emit('signal', { answer: a }); }
            else if (d.answer) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
            else if (d.candidate) await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate));
        });
    </script>
</body>
</html>
