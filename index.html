<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LumiChat - Tam Donanımlı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
            authDomain: "lumichat-64dc8.firebaseapp.com",
            projectId: "lumichat-64dc8",
            storageBucket: "lumichat-64dc8.firebasestorage.app",
            messagingSenderId: "255322307057",
            appId: "1:255322307057:web:9f19046678fb1332b8ac50"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initChatSystem();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });
    </script>
    <style>
        body { margin: 0; background: #0b131a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: #0b131a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #main-app { display: none; flex-direction: column; height: 100vh; }
        .wrapper { display: flex; gap: 10px; padding: 10px; height: 65vh; }
        .box { flex: 1; border: 2px solid #00e5ff; border-radius: 12px; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .report-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 71, 87, 0.2); border: 1px solid #ff4757; color: #ff4757; padding: 8px 12px; border-radius: 5px; opacity: 0; transition: 0.3s; cursor: pointer; }
        .box:hover .report-btn { opacity: 1; }
        .chat-container { width: 350px; background: #142530; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; }
        #chatBox { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; padding: 10px; height: 25vh; }
        .main-btn { flex: 1; border: none; border-radius: 10px; font-size: 2rem; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <button class="main-btn" style="background:#4285F4" onclick="login()">Google ile Giriş Yap</button>
    </div>

    <div id="main-app">
        <div class="wrapper">
            <div class="box"><video id="localVideo" autoplay muted playsinline></video></div>
            <div class="box">
                <video id="remoteVideo" autoplay playsinline></video>
                <button class="report-btn" onclick="alert('Raporlandı!')">Report</button>
            </div>
            <div class="chat-container">
                <div id="chatBox"></div>
                <input type="text" id="msgInput" placeholder="Mesaj yaz...">
            </div>
        </div>
        <div class="controls">
            <button class="main-btn" style="background:#2ecc71" onclick="socket.emit('join')">Eşleş</button>
            <button class="main-btn" style="background:#ff7675" onclick="location.reload()">Sıradaki</button>
        </div>
    </div>

    <script>
        const socket = io('https://lumichat-motor.onrender.com');
        let localStream;

        async function initChatSystem() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
        }

        socket.on('matched', async (d) => {
            // WebRTC mantığı burada (daha önce yazdığımız kodlar)
            console.log("Eşleşme sağlandı");
        });
    </script>
</body>
</html>
