<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LumiChat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
            authDomain: "lumichat-64dc8.firebaseapp.com",
            projectId: "lumichat-64dc8",
            storageBucket: "lumichat-64dc8.firebasestorage.app",
            messagingSenderId: "255322307057",
            appId: "1:255322307057:web:9f19046678fb1332b8ac50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                // Giriş logu
                try {
                    await addDoc(collection(db, "kullanici_loglari"), { 
                        email: user.email, 
                        zaman: serverTimestamp() 
                    });
                } catch(e) { console.error("Log hatası", e); }
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });
    </script>
    <style>
        body { background: #0b131a; color: white; font-family: sans-serif; margin: 0; }
        #auth-screen { display: flex; height: 100vh; justify-content: center; align-items: center; }
        #main-app { display: none; padding: 20px; }
        #chatBox { height: 300px; border: 1px solid #444; overflow-y: scroll; margin-bottom: 10px; }
        .message { margin: 5px; }
    </style>
</head>
<body>
    <div id="auth-screen"><button onclick="loginWithGoogle()">Google ile Giriş Yap</button></div>
    
    <div id="main-app">
        <div id="chatBox"></div>
        <input type="text" id="messageInput"><button id="sendBtn">Gönder</button>
    </div>

    <script>
        const socket = io('https://lumichat-motor.onrender.com');
        const sendBtn = document.getElementById('sendBtn');
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');

        // Yabancı ayrılma durumu
        socket.on('strangerLeft', () => {
            chatBox.innerHTML += '<div class="message system">Yabancı ayrıldı. Yeni birini bulmak için butona basın.</div>';
            // closePeerConnection(); // Eğer bu fonksiyon tanımlıysa burada çağırabilirsin
        });

        // Mesaj Gönderme
        sendBtn.addEventListener('click', () => {
            const msg = messageInput.value.trim();
            if (msg !== "") {
                socket.emit('message', msg);
                chatBox.innerHTML += `<div class="message"><b>Sen:</b> ${msg}</div>`;
                messageInput.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        // Enter ile gönderme
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Mesaj Alma
        socket.on('message', (msg) => {
            chatBox.innerHTML += `<div class="message"><b>Yabancı:</b> ${msg}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
