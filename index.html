<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiChat - Canlı Görüntülü Sohbet</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
            authDomain: "lumichat-64dc8.firebaseapp.com",
            projectId: "lumichat-64dc8",
            storageBucket: "lumichat-64dc8.firebasestorage.app",
            messagingSenderId: "255322307057",
            appId: "1:255322307057:web:9f19046678fb1332b8ac50",
            measurementId: "G-27WK7BNGMT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Giriş fonksiyonu: Sekme kapanma sorununu çözer
        window.loginWithGoogle = async (event) => {
            if (event) event.preventDefault();
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                console.error("Giriş hatası:", err);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                // Giriş logu
                try {
                    await addDoc(collection(db, "kullanici_loglari"), { email: user.email, ad: user.displayName, girisZamani: serverTimestamp() });
                } catch (e) { console.error("Log hatası:", e); }
                
                // Otomatik başlat
                if (!peerConnection) { socket.emit('join'); }
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });
    </script>
    <style>
        body { margin: 0; background: #0b131a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-box { background: #fff; padding: 40px; border-radius: 15px; text-align: center; width: 350px; color: #333; }
        .google-btn { background: #4285F4; color: white; padding: 15px; border-radius: 8px; width: 100%; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; }
        #main-app { display: none; flex-direction: column; height: 100vh; }
        .header { background: #0f1c24; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00e5ff; }
        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; height: calc(100vh - 140px); }
        .video-box { flex: 1; background: #142530; border: 2px solid #00e5ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .chat-container { width: 400px; background: #142530; border: 2px solid #00e5ff; border-radius: 12px; display: flex; flex-direction: column; }
        #chatBox { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px; border-radius: 8px; font-size: 14px; }
        .my-message { background: #00e5ff; color: #000; align-self: flex-end; }
        .stranger-message { background: #3a4f5c; color: #fff; align-self: flex-start; }
        .input-area { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        #sendBtn { background: #00e5ff; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>LumiChat Üyesi Olun!</h2>
            <button class="google-btn" onclick="loginWithGoogle(event)">Google ile devam et</button>
            <p style="font-size: 12px; margin-top: 15px; color: #666;">Kullanım şartlarını kabul ediyorsunuz.</p>
        </div>
    </div>

    <div id="main-app">
        <div class="header"><h2>LumiChat</h2><div style="color: #00e5ff;">🟢 Çevrimiçi</div></div>
        <div class="main-container">
            <div class="video-box"><video id="localVideo" autoplay muted playsinline></video></div>
            <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
            <div class="chat-container">
                <div id="chatBox"></div>
                <div class="input-area"><input type="text" id="messageInput" placeholder="Mesaj yaz..."><button id="sendBtn">Gönder</button></div>
            </div>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn'), messageInput = document.getElementById('messageInput'), chatBox = document.getElementById('chatBox');
        let localStream = null, peerConnection = null;
        const socket = io('https://lumichat-motor.onrender.com');

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => { localStream = s; document.getElementById('localVideo').srcObject = s; });

        socket.on('matched', async (d) => {
            chatBox.innerHTML += '<div class="message">Biri bulundu!</div>';
            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('signal', { candidate: e.candidate }); };
            if (d.isInitiator) { const o = await peerConnection.createOffer(); await peerConnection.setLocalDescription(o); socket.emit('signal', { offer: o }); }
        });

        socket.on('signal', async (d) => {
            if (d.offer) { await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer)); const a = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(a); socket.emit('signal', { answer: a }); }
            else if (d.answer) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
            else if (d.candidate) await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate));
        });

        sendBtn.addEventListener('click', () => { const m = messageInput.value.trim(); if(m) { socket.emit('message', m); chatBox.innerHTML += `<div class="message my-message"><b>Sen:</b> ${m}</div>`; messageInput.value = ""; } });
        socket.on('message', (m) => chatBox.innerHTML += `<div class="message stranger-message"><b>Yabancı:</b> ${m}</div>`);
    </script>
</body>
</html>
