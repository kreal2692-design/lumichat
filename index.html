<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>TEST 999</title>


  <script src="/socket.io/socket.io.js"></script>

  <style>
    :root {
      --bg: #0b0f17;
      --card: rgba(20, 40, 60, 0.9);
      --accent: #00e5ff;
      --text: #e8f0f8;
      --muted: #a9b6c7;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      --success: #2ecc71;
      --danger: #ff7675;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% -10%, rgba(0, 229, 255, 0.15), transparent 40%),
        radial-gradient(circle at 100% 0%, rgba(68, 85, 255, 0.10), transparent 30%),
        linear-gradient(135deg, #07131a 0%, #0b0f17 60%, #0b0f17 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      z-index: 20;
      background:
        radial-gradient(circle at 30% 20%, rgba(0, 229, 255, 0.15), transparent 40%),
        rgba(5, 8, 12, 0.90);
    }

    .card {
      background: rgba(10, 20, 30, 0.92);
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 20px;
      padding: 28px 34px;
      box-shadow: var(--shadow);
      text-align: center;
      min-width: 320px;
      max-width: 480px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      transition: 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-google { background: #4285F4; }
    .btn-primary { background: var(--success); }
    .btn-secondary {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-danger { background: var(--danger); }

    #main-app {
      display: none;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px;
      height: 100vh;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(20, 32, 48, 0.92);
      border: 1px solid rgba(0, 229, 255, 0.25);
      box-shadow: var(--shadow);
    }

    .brand {
      font-size: 36px;
      font-weight: bold;
      color: white;
    }

    .topbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #userInfo {
      color: var(--muted);
      font-size: 14px;
    }

    .status-pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 229, 255, 0.25);
      background: rgba(0, 229, 255, 0.08);
      color: var(--text);
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr 340px;
      gap: 14px;
      flex: 1;
      min-height: 0;
    }

    .box {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(0, 229, 255, 0.25);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #05080c;
    }

    .video-label {
      position: absolute;
      left: 12px;
      top: 12px;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      font-size: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      z-index: 2;
    }

    .report-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 71, 87, 0.22);
      border: 1px solid #ff4757;
      color: #ffb3b3;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      z-index: 2;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      background: rgba(20, 32, 48, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(0, 229, 255, 0.25);
      padding: 12px;
      min-width: 0;
      height: 100%;
      box-shadow: var(--shadow);
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.15);
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message {
      padding: 9px 11px;
      border-radius: 10px;
      max-width: 92%;
      word-break: break-word;
      line-height: 1.4;
    }

    .message.me {
      background: rgba(0, 229, 255, 0.15);
      align-self: flex-end;
    }

    .message.other {
      background: rgba(255, 255, 255, 0.10);
      align-self: flex-start;
    }

    .message.system {
      background: rgba(241, 196, 15, 0.14);
      color: #ffe08a;
      align-self: center;
      text-align: center;
      font-size: 14px;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #msgInput {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(0, 229, 255, 0.4);
      outline: none;
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      font-size: 15px;
    }

    .send-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--accent);
      color: #00131a;
      font-weight: bold;
      min-width: 90px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 12px;
      background: rgba(8, 12, 24, 0.9);
      border: 1px solid rgba(0, 229, 255, 0.25);
      box-shadow: var(--shadow);
      flex-wrap: wrap;
    }

    .debug-bar {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.75);
      color: #7CFFB2;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      max-width: 420px;
      white-space: pre-wrap;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr 1fr;
      }

      .chat-container {
        grid-column: 1 / -1;
        min-height: 420px;
      }
    }

    @media (max-width: 720px) {
      body { overflow: auto; }

      #main-app {
        padding: 12px;
        height: auto;
        min-height: 100vh;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="auth-screen" class="screen" style="display:grid;">
    <div class="card">
      <div class="title">LumiChat</div>
      <div class="subtitle">Google ile giriş yaparak devam et.</div>
      <button class="btn btn-google" id="loginBtn">Google ile Giriş Yap</button>
    </div>
  </div>

  <div id="membership-screen" class="screen">
    <div class="card">
      <div class="title">Üyelik Gerekli</div>
      <div class="subtitle">
        Hesabında aktif üyelik görünmüyor. Test için üyelik açabilirsin.
      </div>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-primary" id="activateMembershipBtn">Test İçin Üyelik Aç</button>
        <button class="btn btn-secondary" id="logoutBtnMembership">Çıkış Yap</button>
      </div>
    </div>
  </div>

  <div id="main-app">
    <div class="app-shell">
      <div class="topbar">
        <div class="brand">LumiChat</div>
        <div class="topbar-right">
          <div id="userInfo"></div>
          <div id="statusText" class="status-pill">Yükleniyor</div>
          <button class="btn btn-secondary" id="logoutBtnMain">Çıkış Yap</button>
        </div>
      </div>

      <div class="layout">
        <div class="box">
          <div class="video-label">Sen</div>
          <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="box">
          <div class="video-label">Karşı taraf</div>
          <video id="remoteVideo" autoplay playsinline></video>
          <button class="report-btn" id="reportBtn">Report</button>
        </div>

        <aside class="chat-container">
          <div id="chatBox"></div>
          <div class="chat-input-row">
            <input type="text" id="msgInput" placeholder="Mesaj yaz..." disabled />
            <button id="sendBtn" class="send-btn" disabled>Gönder</button>
          </div>
        </aside>
      </div>

      <div class="controls">
        <button id="matchBtn" class="btn btn-primary">Eşleş</button>
        <button id="nextBtn" class="btn btn-secondary">Sıradaki</button>
        <button id="leaveBtn" class="btn btn-danger">Ayrıl</button>
      </div>
    </div>
  </div>

  <div id="debugBar" class="debug-bar">Başlatılıyor...</div>

  <script type="module">
    import { initializeApp } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js)";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js)";
import { getFirestore, doc, getDoc, setDoc } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js)";


    import {
      getAuth,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged,
      signOut
    } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js)";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js)";

    const debugBar = document.getElementById("debugBar");

    function debug(text) {
      console.log(text);
      debugBar.textContent = text;
    }

    function safeAlert(text) {
      console.error(text);
      alert(text);
    }

    debug("HTML yüklendi");

    if (typeof io === "undefined") {
      debug("HATA: socket.io yüklenemedi");
      throw new Error("socket.io yüklenemedi");
    }

    debug("socket.io yüklendi");

    const firebaseConfig = {
      apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
      authDomain: "lumichat-64dc8.firebaseapp.com",
      projectId: "lumichat-64dc8",
      storageBucket: "lumichat-64dc8.firebasestorage.app",
      messagingSenderId: "255322307057",
      appId: "1:255322307057:web:9f19046678fb1332b8ac50"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const socket = io();

    debug("Firebase başlatıldı");

    const authScreen = document.getElementById("auth-screen");
    const membershipScreen = document.getElementById("membership-screen");
    const mainApp = document.getElementById("main-app");
    const userInfo = document.getElementById("userInfo");
    const statusText = document.getElementById("statusText");
    const localVideo = document.getElementById("localVideo");
    const remoteVideo = document.getElementById("remoteVideo");
    const chatBox = document.getElementById("chatBox");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const matchBtn = document.getElementById("matchBtn");
    const nextBtn = document.getElementById("nextBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const loginBtn = document.getElementById("loginBtn");
    const activateMembershipBtn = document.getElementById("activateMembershipBtn");
    const logoutBtnMembership = document.getElementById("logoutBtnMembership");
    const logoutBtnMain = document.getElementById("logoutBtnMain");
    const reportBtn = document.getElementById("reportBtn");

    let localStream = null;
    let peerConnection = null;
    let isMatched = false;
    let appInitialized = false;

    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
      ]
    };

    function setStatus(text) {
      statusText.textContent = text;
      debug("STATUS: " + text);
    }

    function showScreen(name) {
      authScreen.style.display = "none";
      membershipScreen.style.display = "none";
      mainApp.style.display = "none";

      if (name === "auth") authScreen.style.display = "grid";
      if (name === "membership") membershipScreen.style.display = "grid";
      if (name === "main") mainApp.style.display = "block";
    }

    function setChatEnabled(enabled) {
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function addChatMessage(text, type = "system") {
      const msg = document.createElement("div");
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function initCamera() {
      try {
        debug("Kamera izni isteniyor");
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });
        localVideo.srcObject = localStream;
        debug("Kamera bağlandı");
      } catch (error) {
        console.error(error);
        debug("Kamera hatası: " + error.message);
        addChatMessage("Kamera veya mikrofon izni alınamadı.", "system");
        setStatus("Kamera izni gerekli");
      }
    }

    function clearRemoteVideo() {
      remoteVideo.srcObject = null;
    }

    function closePeerConnection() {
      if (peerConnection) {
        peerConnection.onicecandidate = null;
        peerConnection.ontrack = null;
        peerConnection.close();
        peerConnection = null;
      }
      clearRemoteVideo();
    }

    function createPeerConnection() {
      closePeerConnection();

      peerConnection = new RTCPeerConnection(rtcConfig);

      if (localStream) {
        localStream.getTracks().forEach((track) => {
          peerConnection.addTrack(track, localStream);
        });
      }

      peerConnection.onicecandidate = (event) => {
        if (event.candidate && isMatched) {
          socket.emit("signal", {
            type: "candidate",
            candidate: event.candidate
          });
        }
      };

      peerConnection.ontrack = (event) => {
        const [remoteStream] = event.streams;
        if (remoteStream) {
          remoteVideo.srcObject = remoteStream;
        }
      };

      return peerConnection;
    }

    async function createOffer() {
      if (!peerConnection) createPeerConnection();

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      socket.emit("signal", {
        type: "offer",
        sdp: offer
      });
    }

    async function handleSignal(data) {
      try {
        if (!peerConnection) createPeerConnection();

        if (data.type === "offer") {
          await peerConnection.setRemoteDescription(data.sdp);
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);

          socket.emit("signal", {
            type: "answer",
            sdp: answer
          });
        } else if (data.type === "answer") {
          await peerConnection.setRemoteDescription(data.sdp);
        } else if (data.type === "candidate" && data.candidate) {
          await peerConnection.addIceCandidate(data.candidate);
        }
      } catch (error) {
        console.error(error);
        debug("WebRTC hata: " + error.message);
      }
    }

    async function initChatSystem() {
      if (appInitialized) return;
      appInitialized = true;

      addChatMessage("Uygulama hazırlanıyor...", "system");
      await initCamera();
      setChatEnabled(false);
      setStatus("Hazır");
      addChatMessage("Giriş başarılı. Eşleş butonuna bas.", "system");
    }

    function resetChatState(messageText = "") {
      isMatched = false;
      setChatEnabled(false);
      closePeerConnection();

      if (messageText) {
        addChatMessage(messageText, "system");
      }
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !isMatched) return;

      addChatMessage("Sen: " + text, "me");
      socket.emit("message", text);
      msgInput.value = "";
    }

    loginBtn.addEventListener("click", async () => {
      try {
        debug("Google giriş başladı");

        if (location.protocol === "file:") {
          safeAlert("Bu projeyi file:// ile değil, localhost veya bir sunucu üzerinden açmalısın.");
          return;
        }

        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        debug("Google login tamamlandı: " + (user.email || user.uid));

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await setDoc(userRef, {
            displayName: user.displayName || "",
            email: user.email || "",
            hasMembership: false,
            createdAt: new Date().toISOString()
          });
          debug("Yeni kullanıcı Firestore'a yazıldı");
        } else {
          debug("Kullanıcı kaydı zaten var");
        }
      } catch (error) {
        console.error(error);
        debug("Google giriş hatası: " + error.message);
        safeAlert("Google giriş hatası: " + error.message);
      }
    });

    activateMembershipBtn.addEventListener("click", async () => {
      try {
        debug("Üyelik butonuna basıldı");

        const user = auth.currentUser;
        if (!user) {
          safeAlert("Önce giriş yapmalısın.");
          return;
        }

        const userRef = doc(db, "users", user.uid);

        await setDoc(userRef, {
          displayName: user.displayName || "",
          email: user.email || "",
          hasMembership: true,
          updatedAt: new Date().toISOString()
        }, { merge: true });

        debug("Üyelik aktif edildi");
        showScreen("main");
        await initChatSystem();
      } catch (error) {
        console.error(error);
        debug("Üyelik açma hatası: " + error.message);
        safeAlert("Üyelik açma hatası: " + error.message);
      }
    });

    logoutBtnMembership.addEventListener("click", async () => {
      await signOut(auth);
    });

    logoutBtnMain.addEventListener("click", async () => {
      await signOut(auth);
    });

    reportBtn.addEventListener("click", () => {
      addChatMessage("Raporlama özelliği henüz aktif değil.", "system");
    });

    matchBtn.addEventListener("click", () => {
      resetChatState();
      setStatus("Eşleşme aranıyor...");
      addChatMessage("Eşleşme aranıyor...", "system");
      socket.emit("join");
    });

    nextBtn.addEventListener("click", () => {
      resetChatState("Yeni biri aranıyor...");
      setStatus("Sıradaki aranıyor...");
      socket.emit("next");
    });

    leaveBtn.addEventListener("click", () => {
      resetChatState("Sohbetten ayrıldın.");
      setStatus("Sohbetten ayrıldın");
      socket.emit("leave");
    });

    sendBtn.addEventListener("click", sendMessage);

    msgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    socket.on("connect", () => {
      debug("Socket bağlandı");
      setStatus("Bağlandı");
    });

    socket.on("waiting", () => {
      resetChatState("Şu an bir eşleşme bekleniyor...");
      setStatus("Bekleniyor...");
    });

    socket.on("matched", async (data) => {
      isMatched = true;
      setChatEnabled(true);
      setStatus("Eşleşti");
      addChatMessage("Biriyle eşleştin. Artık mesaj gönderebilirsin.", "system");
      msgInput.focus();

      createPeerConnection();

      if (data.isInitiator) {
        await createOffer();
      }
    });

    socket.on("message", (text) => {
      addChatMessage("Karşı: " + text, "other");
    });

    socket.on("signal", async (data) => {
      await handleSignal(data);
    });

    socket.on("strangerLeft", () => {
      resetChatState("Karşı taraf sohbetten ayrıldı.");
      setStatus("Karşı taraf ayrıldı");
    });

    socket.on("disconnect", () => {
      resetChatState("Sunucu bağlantısı kesildi.");
      setStatus("Bağlantı koptu");
    });

    onAuthStateChanged(auth, async (user) => {
      try {
        if (!user) {
          debug("Kullanıcı giriş yapmamış");
          showScreen("auth");
          return;
        }

        debug("Kullanıcı bulundu: " + (user.email || user.uid));

        userInfo.textContent = user.displayName
          ? "Giriş yapıldı: " + user.displayName
          : "Giriş yapıldı";

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          debug("Firestore user kaydı yok");
          showScreen("membership");
          return;
        }

        const userData = userSnap.data();

        if (!userData.hasMembership) {
          debug("Üyelik yok");
          showScreen("membership");
          return;
        }

        debug("Üyelik var, ana ekran açılıyor");
        showScreen("main");
        await initChatSystem();
      } catch (error) {
        console.error(error);
        debug("Auth state hatası: " + error.message);
        safeAlert("Sistem başlatma hatası: " + error.message);
      }
    });

    debug("Script tamamen hazır");
  </script>
</body>
</html>
