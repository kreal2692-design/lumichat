<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumiChat</title>

  <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css)" />
  <script src="[cdn.socket.io](https://cdn.socket.io/4.7.5/socket.io.min.js)"></script>

  <script type="module">
    import { initializeApp } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js)";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js)";
    import { getFirestore, doc, getDoc, setDoc } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js)";

    const firebaseConfig = {
      apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
      authDomain: "lumichat-64dc8.firebaseapp.com",
      projectId: "lumichat-64dc8",
      storageBucket: "lumichat-64dc8.firebasestorage.app",
      messagingSenderId: "255322307057",
      appId: "1:255322307057:web:9f19046678fb1332b8ac50"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window.firebaseAuth = auth;
    window.firebaseDb = db;

    window.login = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await setDoc(userRef, {
            displayName: user.displayName || '',
            email: user.email || '',
            hasMembership: false,
            createdAt: new Date().toISOString()
          });
        }
      } catch (error) {
        console.error('Giris hatasi:', error);
        alert('Google girisi sirasinda hata olustu.');
      }
    };

    window.logout = async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error('Cikis hatasi:', error);
      }
    };

    async function checkMembershipAndStart(user) {
      const authScreen = document.getElementById('auth-screen');
      const membershipScreen = document.getElementById('membership-screen');
      const mainApp = document.getElementById('main-app');
      const userInfo = document.getElementById('userInfo');

      authScreen.style.display = 'none';
      membershipScreen.style.display = 'none';
      mainApp.style.display = 'none';

      if (userInfo) {
        userInfo.textContent = user.displayName
          ? `Giris yapildi: ${user.displayName}`
          : 'Giris yapildi';
      }

      try {
        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await setDoc(userRef, {
            displayName: user.displayName || '',
            email: user.email || '',
            hasMembership: false,
            createdAt: new Date().toISOString()
          });

          membershipScreen.style.display = 'grid';
          return;
        }

        const userData = userSnap.data();

        if (!userData.hasMembership) {
          membershipScreen.style.display = 'grid';
          return;
        }

        mainApp.style.display = 'flex';

        if (window.startAppAfterLogin) {
          window.startAppAfterLogin();
        }
      } catch (error) {
        console.error('Uyelik kontrol hatasi:', error);
        alert('Uyelik kontrolu yapilirken hata olustu.');
      }
    }

    onAuthStateChanged(auth, async (user) => {
      const authScreen = document.getElementById('auth-screen');
      const membershipScreen = document.getElementById('membership-screen');
      const mainApp = document.getElementById('main-app');
      const userInfo = document.getElementById('userInfo');

      if (user) {
        await checkMembershipAndStart(user);
      } else {
        authScreen.style.display = 'grid';
        membershipScreen.style.display = 'none';
        mainApp.style.display = 'none';

        if (userInfo) {
          userInfo.textContent = '';
        }
      }
    });

    window.activateMembershipForTest = async () => {
      const user = auth.currentUser;

      if (!user) {
        alert('Once giris yapmalisin.');
        return;
      }

      try {
        const userRef = doc(db, 'users', user.uid);
        await setDoc(userRef, {
          displayName: user.displayName || '',
          email: user.email || '',
          hasMembership: true,
          updatedAt: new Date().toISOString()
        }, { merge: true });

        alert('Test icin uyelik aktif edildi.');
        await checkMembershipAndStart(user);
      } catch (error) {
        console.error('Uyelik aktif etme hatasi:', error);
      }
    };
  </script>

  <style>
    :root {
      --bg: #0b0f17;
      --card: rgba(20, 40, 60, 0.9);
      --accent: #00e5ff;
      --accent2: #4cc9f0;
      --text: #e8f0f8;
      --muted: #a9b6c7;
      --shadow: 0 10px 25px rgba(0, 0, 0, .35);
      --success: #2ecc71;
      --danger: #ff7675;
      --warning: #f1c40f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% -10%, rgba(0, 229, 255, .15), transparent 40%),
        radial-gradient(circle at 100% 0%, rgba(68, 85, 255, .10), transparent 30%),
        linear-gradient(135deg, #07131a 0%, #0b0f17 60%, #0b0f17 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    #auth-screen,
    #membership-screen {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      z-index: 9999;
      background:
        radial-gradient(circle at 30% 20%, rgba(0, 229, 255, .15), transparent 40%),
        rgba(5, 8, 12, .90);
      backdrop-filter: saturate(1.2) blur(2px);
    }

    .auth-card,
    .membership-card {
      background: rgba(10, 20, 30, 0.88);
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 20px;
      padding: 28px 34px;
      box-shadow: var(--shadow);
      text-align: center;
      min-width: 320px;
      max-width: 460px;
    }

    .auth-title {
      font-weight: 700;
      font-size: 1.25rem;
      margin-bottom: 12px;
    }

    .main-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
      background: #4285F4;
      box-shadow: 0 6px 16px rgba(66, 133, 244, .6);
    }

    .main-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(66, 133, 244, .8);
    }

    .secondary-btn {
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 12px;
      padding: 12px 18px;
      background: rgba(255, 255, 255, .08);
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    #main-app {
      display: none;
      flex: 1;
      padding: 18px;
      gap: 14px;
      align-items: stretch;
      justify-content: center;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(20, 32, 48, .92);
      border: 1px solid rgba(0, 229, 255, .25);
      box-shadow: var(--shadow);
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #userInfo {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status-pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 229, 255, .25);
      background: rgba(0, 229, 255, .08);
      color: var(--text);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .logout-btn {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .15);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr 340px;
      gap: 14px;
      width: 100%;
      height: calc(100vh - 150px);
    }

    .box {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(0, 229, 255, .25);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #05080c;
    }

    .video-label {
      position: absolute;
      left: 12px;
      top: 12px;
      background: rgba(0, 0, 0, .45);
      color: white;
      font-size: 0.9rem;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .12);
      z-index: 2;
    }

    .report-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 71, 87, 0.22);
      border: 1px solid #ff4757;
      color: #ffb3b3;
      padding: 8px 12px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity .25s ease;
      cursor: pointer;
      backdrop-filter: blur(2px);
      z-index: 2;
    }

    .box:hover .report-btn {
      opacity: 1;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      background: rgba(20, 32, 48, .95);
      border-radius: 16px;
      border: 1px solid rgba(0, 229, 255, .25);
      padding: 12px;
      min-width: 0;
      height: 100%;
      box-shadow: var(--shadow);
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(0, 0, 0, .15);
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message {
      padding: 9px 11px;
      border-radius: 10px;
      max-width: 92%;
      word-break: break-word;
      line-height: 1.4;
    }

    .message.me {
      background: rgba(0, 229, 255, 0.15);
      align-self: flex-end;
    }

    .message.other {
      background: rgba(255, 255, 255, 0.10);
      align-self: flex-start;
    }

    .message.system {
      background: rgba(241, 196, 15, 0.14);
      color: #ffe08a;
      align-self: center;
      text-align: center;
      font-size: 0.92rem;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #msgInput {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(0, 229, 255, .4);
      outline: none;
      background: rgba(15, 23, 42, .9);
      color: var(--text);
      font-size: 0.96rem;
    }

    #msgInput:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .send-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--accent);
      color: #00131a;
      font-weight: 700;
      min-width: 90px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 12px;
      background: rgba(8, 12, 24, .9);
      border: 1px solid rgba(0, 229, 255, .25);
      box-shadow: var(--shadow);
      flex-wrap: wrap;
    }

    .control-btn {
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 1rem;
      min-width: 130px;
      transition: transform .2s ease, background .2s ease, opacity .2s ease;
    }

    .control-btn.primary {
      background: var(--success);
    }

    .control-btn.secondary {
      background: var(--danger);
    }

    .control-btn.ghost {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .15);
    }

    .control-btn:disabled,
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .membership-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .hint {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr 1fr;
        height: auto;
      }

      .chat-container {
        grid-column: 1 / -1;
        min-height: 420px;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      #main-app {
        padding: 12px;
      }

      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-right {
        width: 100%;
        justify-content: flex-start;
      }

      .control-btn,
      .send-btn {
        width: 100%;
      }

      .controls {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-title">LumiChat'e Hos Geldiniz</div>
      <p style="color:var(--muted); margin: 0 0 14px;">Google ile hizli ve guvenli giris yapin.</p>
      <button class="main-btn" onclick="login()">
        <i class="fab fa-google"></i>
        Google ile Giris Yap
      </button>
    </div>
  </div>

  <div id="membership-screen">
    <div class="membership-card">
      <div class="auth-title">Uyelik Gerekli</div>
      <p class="hint">
        Bu alana girmek icin aktif uyelik gerekiyor.
        Google ile giris yaptin ama hesabinda su an uyelik aktif gorunmuyor.
      </p>

      <div class="membership-actions">
        <button class="main-btn" onclick="activateMembershipForTest()">
          Test Icin Uyelik Ac
        </button>
        <button class="secondary-btn" onclick="logout()">
          Cikis Yap
        </button>
      </div>
    </div>
  </div>

  <div id="main-app">
    <div class="app-shell">
      <div class="topbar">
        <div class="brand">LumiChat</div>

        <div class="topbar-right">
          <div id="userInfo"></div>
          <div id="statusText" class="status-pill">Hazir</div>
          <button class="logout-btn" onclick="logout()">Cikis Yap</button>
        </div>
      </div>

      <div class="layout">
        <div class="box" aria-label="Kullanici kamerasi">
          <div class="video-label">Sen</div>
          <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="box" aria-label="Uzak kamera" style="min-height: 240px;">
          <div class="video-label">Karsi taraf</div>
          <video id="remoteVideo" autoplay playsinline></video>
          <button class="report-btn" onclick="alert('Raporlama sistemi daha sonra baglanacak.')">
            <i class="fa fa-flag"></i> Report
          </button>
        </div>

        <aside class="chat-container" aria-label="Sohbet">
          <div id="chatBox"></div>

          <div class="chat-input-row">
            <input type="text" id="msgInput" placeholder="Mesaj yaz..." disabled />
            <button id="sendBtn" class="send-btn" disabled>Gonder</button>
          </div>
        </aside>
      </div>

      <div class="controls">
        <button id="matchBtn" class="control-btn primary">
          <i class="fa fa-link"></i> Esles
        </button>

        <button id="nextBtn" class="control-btn ghost">
          Siradaki
        </button>

        <button id="leaveBtn" class="control-btn secondary">
          Ayril
        </button>
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const matchBtn = document.getElementById('matchBtn');
    const nextBtn = document.getElementById('nextBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const statusText = document.getElementById('statusText');

    let localStream = null;
    let peerConnection = null;
    let isMatched = false;
    let isInitiator = false;
    let appInitialized = false;

    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
      ]
    };

    function setStatus(text) {
      statusText.textContent = text;
    }

    function setChatEnabled(enabled) {
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function addChatMessage(text, type = 'system') {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function initCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        localVideo.srcObject = localStream;
      } catch (error) {
        console.error('Kamera/Mikrofon hatasi:', error);
        addChatMessage('Kamera veya mikrofon izni alinamadi.', 'system');
        setStatus('Kamera izni gerekli');
      }
    }

    function clearRemoteVideo() {
      remoteVideo.srcObject = null;
    }

    function closePeerConnection() {
      if (peerConnection) {
        peerConnection.onicecandidate = null;
        peerConnection.ontrack = null;
        peerConnection.close();
        peerConnection = null;
      }
      clearRemoteVideo();
    }

    function createPeerConnection() {
      closePeerConnection();

      peerConnection = new RTCPeerConnection(rtcConfig);

      if (localStream) {
        localStream.getTracks().forEach((track) => {
          peerConnection.addTrack(track, localStream);
        });
      }

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('signal', {
            type: 'candidate',
            candidate: event.candidate
          });
        }
      };

      peerConnection.ontrack = (event) => {
        const [remoteStream] = event.streams;
        if (remoteStream) {
          remoteVideo.srcObject = remoteStream;
        }
      };

      return peerConnection;
    }

    async function createOffer() {
      if (!peerConnection) createPeerConnection();

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      socket.emit('signal', {
        type: 'offer',
        sdp: offer
      });
    }

    async function handleSignal(data) {
      try {
        if (!peerConnection) {
          createPeerConnection();
        }

        if (data.type === 'offer') {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);

          socket.emit('signal', {
            type: 'answer',
            sdp: answer
          });
        }

        if (data.type === 'answer') {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
        }

        if (data.type === 'candidate' && data.candidate) {
          await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
      } catch (error) {
        console.error('WebRTC signal hatasi:', error);
      }
    }

    async function initChatSystem() {
      if (appInitialized) return;
      appInitialized = true;

      await initCamera();
      setChatEnabled(false);
      setStatus('Hazir');
      addChatMessage('Giris basarili. Esles butonuna basarak sohbet baslatabilirsin.', 'system');
    }

    function resetChatState(messageText = '') {
      isMatched = false;
      isInitiator = false;
      setChatEnabled(false);
      closePeerConnection();

      if (messageText) {
        addChatMessage(messageText, 'system');
      }
    }

    function sendMessage() {
      const text = msgInput.value.trim();

      if (!text || !isMatched) return;

      addChatMessage(`Sen: ${text}`, 'me');
      socket.emit('message', text);
      msgInput.value = '';
    }

    matchBtn.addEventListener('click', () => {
      resetChatState();
      setStatus('Eslesme araniyor...');
      addChatMessage('Eslesme araniyor...', 'system');
      socket.emit('join');
    });

    nextBtn.addEventListener('click', () => {
      resetChatState('Yeni biri araniyor...');
      setStatus('Siradaki araniyor...');
      socket.emit('next');
    });

    leaveBtn.addEventListener('click', () => {
      resetChatState('Sohbetten ayrildin.');
      setStatus('Sohbetten ayrildin');
      socket.emit('leave');
    });

    sendBtn.addEventListener('click', sendMessage);

    msgInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    });

    socket.on('connect', () => {
      setStatus('Baglandi');
    });

    socket.on('waiting', () => {
      resetChatState('Su an bir eslesme bekleniyor...');
      setStatus('Bekleniyor...');
    });

    socket.on('matched', async (data) => {
      isMatched = true;
      isInitiator = !!data.isInitiator;
      setChatEnabled(true);
      setStatus('Eslesti');
      addChatMessage('Biriyle eslestin. Artik mesaj gonderebilirsin.', 'system');
      msgInput.focus();

      createPeerConnection();

      if (isInitiator) {
        await createOffer();
      }
    });

    socket.on('message', (text) => {
      addChatMessage(`Karsi: ${text}`, 'other');
    });

    socket.on('signal', async (data) => {
      await handleSignal(data);
    });

    socket.on('strangerLeft', () => {
      resetChatState('Karsi taraf sohbetten ayrildi.');
      setStatus('Karsi taraf ayrildi');
    });

    socket.on('disconnect', () => {
      resetChatState('Sunucu baglantisi kesildi.');
      setStatus('Baglanti koptu');
    });

    window.startAppAfterLogin = initChatSystem;
  </script>
</body>
</html>
