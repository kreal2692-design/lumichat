<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiChat - Canlı Görüntülü Sohbet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
            authDomain: "lumichat-64dc8.firebaseapp.com",
            projectId: "lumichat-64dc8",
            storageBucket: "lumichat-64dc8.firebasestorage.app",
            messagingSenderId: "255322307057",
            appId: "1:255322307057:web:9f19046678fb1332b8ac50"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = async (event) => {
            if (event) event.preventDefault();
            try { await signInWithPopup(auth, provider); } 
            catch (err) { console.error("Giriş hatası:", err); }
        };

        onAuthStateChanged(auth, async (user) => {
            const authScreen = document.getElementById('auth-screen');
            const mainApp = document.getElementById('main-app');
            if (user) {
                authScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                // Kullanıcı giriş yaptı, kamera izni iste ve sohbete başla
                startCameraAndSocket();
            } else {
                authScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        });
    </script>
    <style>
        body { margin: 0; background: #0b131a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b131a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-box { background: #fff; padding: 40px; border-radius: 20px; text-align: center; width: 350px; color: #333; }
        .google-btn { background: #4285F4; color: white; padding: 15px; border-radius: 10px; width: 100%; border: none; cursor: pointer; font-size: 16px; margin-top: 20px; }
        
        #main-app { display: none; flex-direction: column; height: 100vh; }
        .video-container { display: flex; flex: 1; padding: 10px; gap: 10px; height: calc(100vh - 100px); }
        .video-box { flex: 1; background: #000; border: 2px solid #00e5ff; border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { height: 100px; display: flex; justify-content: center; align-items: center; gap: 20px; background: #0f1c24; }
        .btn-control { padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-next { background: #00e5ff; color: #000; }
        
        .chat-container { width: 350px; background: #142530; display: flex; flex-direction: column; border-left: 2px solid #00e5ff; }
        #chatBox { flex: 1; padding: 15px; overflow-y: auto; }
        .input-area { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>LumiChat Üyesi Olun</h2>
            <p>Sohbete başlamak için giriş yapın.</p>
            <button class="google-btn" onclick="loginWithGoogle(event)"><i class="fa-brands fa-google"></i> Google ile Giriş Yap</button>
        </div>
    </div>

    <div id="main-app">
        <div class="video-container">
            <div class="video-box"><video id="localVideo" autoplay muted playsinline></video></div>
            <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
            <div class="chat-container">
                <div id="chatBox"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz...">
                    <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="btn-control" onclick="toggleTrack('video')"><i class="fa-solid fa-video"></i> Kamera</button>
            <button class="btn-control" onclick="toggleTrack('audio')"><i class="fa-solid fa-microphone"></i> Mikrofon</button>
            <button class="btn-control btn-next" onclick="location.reload()"><i class="fa-solid fa-forward"></i> Sıradaki</button>
        </div>
    </div>

    <script>
        const socket = io('https://lumichat-motor.onrender.com');
        let localStream, peerConnection;

        async function startCameraAndSocket() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            socket.emit('join');
        }

        function toggleTrack(type) {
            localStream.getTracks().forEach(t => { if (t.kind === type) t.enabled = !t.enabled; });
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const m = document.getElementById('messageInput').value;
            if (m) { socket.emit('message', m); document.getElementById('chatBox').innerHTML += `<div><b>Sen:</b> ${m}</div>`; document.getElementById('messageInput').value = ''; }
        }

        socket.on('matched', async (d) => {
            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('signal', { candidate: e.candidate }); };
            if (d.isInitiator) { const o = await peerConnection.createOffer(); await peerConnection.setLocalDescription(o); socket.emit('signal', { offer: o }); }
        });

        socket.on('signal', async (d) => {
            if (d.offer) { await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer)); const a = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(a); socket.emit('signal', { answer: a }); }
            else if (d.answer) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
            else if (d.candidate) await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate));
        });
    </script>
</body>
</html>
