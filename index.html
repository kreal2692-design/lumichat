<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LumiChat - Final Sürümü</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-Eg536s2P4Gb38xXEmKstNfBcpmhUaJE",
            authDomain: "lumichat-64dc8.firebaseapp.com",
            projectId: "lumichat-64dc8",
            storageBucket: "lumichat-64dc8.firebasestorage.app",
            messagingSenderId: "255322307057",
            appId: "1:255322307057:web:9f19046678fb1332b8ac50"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initCamera();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });
    </script>
    <style>
        body { margin: 0; background: #0b0f17; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #auth-screen { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 9999; }
        .auth-card { background: white; color: #333; padding: 40px; border-radius: 20px; text-align: center; }

        #main-app { display: none; flex: 1; flex-direction: column; padding: 15px; gap: 15px; max-width: 1400px; margin: 0 auto; width: 100%; height: 100vh; }
        .layout { display: grid; grid-template-columns: 1fr 1fr 350px; gap: 15px; flex: 1; min-height: 0; }
        
        .box { background: #000; border: 2px solid #00e5ff; border-radius: 16px; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .report-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 71, 87, 0.2); border: 1px solid #ff4757; color: #ff4757; padding: 8px 12px; border-radius: 8px; opacity: 0; transition: 0.3s; cursor: pointer; }
        .box:hover .report-btn { opacity: 1; }

        .chat-container { background: #142530; border: 1px solid #00e5ff; border-radius: 16px; padding: 15px; display: flex; flex-direction: column; }
        #chatBox { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        
        .controls { display: flex; gap: 15px; height: 120px; }
        .control-btn { flex: 1; border: none; border-radius: 16px; font-size: 1.5rem; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2>LumiChat'e Hoş Geldin!</h2>
            <button onclick="login()" style="background:#4285F4; color:white; padding:15px 30px; border:none; border-radius:10px; cursor:pointer;">
                <i class="fab fa-google"></i> Google ile Giriş Yap
            </button>
        </div>
    </div>

    <div id="main-app">
        <div class="layout">
            <div class="box"><video id="localVideo" autoplay muted playsinline></video></div>
            <div class="box">
                <video id="remoteVideo" autoplay playsinline></video>
                <button class="report-btn" onclick="alert('Raporlandı!')">Report</button>
            </div>
            <aside class="chat-container">
                <div id="chatBox"></div>
                <input type="text" id="msgInput" placeholder="Mesaj yaz..." style="width:100%; padding:10px; border-radius:8px; border:none;">
            </aside>
        </div>
        <div class="controls">
            <button class="control-btn" style="background:#2ecc71" onclick="socket.emit('join')">Eşleş</button>
            <button class="control-btn" style="background:#ff7675" onclick="location.reload()">Sıradaki</button>
        </div>
    </div>

    <script>
        const socket = io('https://lumichat-motor.onrender.com');
        let localStream, peerConnection;

        async function initCamera() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
        }

        socket.on('matched', async (d) => {
            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('signal', { candidate: e.candidate }); };
            if (d.isInitiator) { const o = await peerConnection.createOffer(); await peerConnection.setLocalDescription(o); socket.emit('signal', { offer: o }); }
        });

        socket.on('signal', async (d) => {
            if (d.offer) { await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer)); const a = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(a); socket.emit('signal', { answer: a }); }
            else if (d.answer) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
            else if (d.candidate) await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate));
        });
    </script>
</body>
</html>
